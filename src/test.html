<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PortfolioGallery test</title>
  <link rel="stylesheet" href="./style/default.css" />
  <style>
    body { background: #1a1a1a; font-family: sans-serif; padding: 24px; }
  </style>
</head>
<body>
  <h1 style="color: #eee;">PortfolioGallery test</h1>
  <portfolio-gallery></portfolio-gallery>

  <script type="module">
    import './PortfolioGallery.js';

    const fakeItems = [
      { id: 'a1', title: 'Forest Sprite', description: '', tags: [], platform: 'deviantart', images: ['https://placehold.co/400x400?text=1'], sourceUrl: 'https://deviantart.com/a/forest', createdAt: '2026-01-01' },
      { id: 'a2', title: 'Ocean Dream', description: '', tags: [], platform: 'instagram', images: ['https://placehold.co/400x400?text=2'], sourceUrl: 'https://instagram.com/p/a2', createdAt: '2026-01-02' },
      { id: 'a3', title: 'City Lights', description: '', tags: [], platform: 'deviantart', images: ['https://placehold.co/400x400?text=3'], sourceUrl: 'https://deviantart.com/a/city', createdAt: '2026-01-03' },
      { id: 'a4', title: 'Mountain Peak', description: '', tags: [], platform: 'deviantart', images: ['https://placehold.co/400x400?text=4'], sourceUrl: 'https://deviantart.com/a/mountain', createdAt: '2026-01-04' },
      { id: 'a5', title: 'Desert Sun', description: '', tags: [], platform: 'instagram', images: ['https://placehold.co/400x400?text=5'], sourceUrl: 'https://instagram.com/p/a5', createdAt: '2026-01-05' },
      { id: 'a6', title: 'Rainy Street', description: '', tags: [], platform: 'deviantart', images: ['https://placehold.co/400x400?text=6'], sourceUrl: 'https://deviantart.com/a/rain', createdAt: '2026-01-06' },
    ];

    // Pin item a3 as featured, and group a4/a5/a6 into a stack.
    const curationConfig = {
      pins: [
        { match: 'id', value: 'a3', display: 'featured', position: 'top' },
      ],
      groups: [
        {
          label: 'trio',
          layout: 'stack',
          position: 'top',
          items: [
            { match: 'id', value: 'a4' },
            { match: 'id', value: 'a5' },
            { match: 'id', value: 'a6' },
          ],
        },
      ],
    };

    const gallery = document.querySelector('portfolio-gallery');
    gallery.items = fakeItems;
    gallery.curationConfig = curationConfig;
  </script>
</body>
</html>
